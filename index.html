<!DOCTYPE html>
<html lang="de">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3036128934622320" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" sizes="1280x1280" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta charset="UTF-8">
    <title>Das Passwort Spiel</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f5f5f0; --card-bg: #ffffff; --text: #2c2c2e; --accent: #d4a373; --error: #e63946; --success: #2a9d8f; --border: #e0e0d5; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Georgia', serif; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        .ad-sidebar { width: 160px; height: 600px; position: fixed; top: 100px; z-index: 50; }
        .ad-left { left: 20px; } .ad-right { right: 20px; }
        @media (max-width: 1250px) { .ad-sidebar { display: none; } }
        .main-content { width: 100%; max-width: 700px; padding: 60px 20px 250px 20px; display: flex; flex-direction: column; align-items: center; }
        .header { display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 20px; }
        .header img { height: 60px; margin-bottom: 15px; cursor: pointer; }
        .header h1 { font-size: 3.5rem; font-weight: 400; margin: 0 0 20px 0; letter-spacing: -1px; text-align: center; }
        #password-container { width: 100%; position: sticky; top: 20px; z-index: 100; background: var(--bg); padding-bottom: 30px; }
        .input-group { display: flex; gap: 8px; align-items: stretch; width: 100%; position: relative; }
        .btn-status { position: absolute; top: -25px; font-family: sans-serif; font-size: 11px; font-weight: bold; text-transform: uppercase; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        #share-status { left: 5px; color: var(--accent); } #save-status { right: 5px; color: var(--success); }
        .action-btn { background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; width: 50px; cursor: pointer; color: var(--text); font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.03); flex-shrink: 0; }
        .action-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .input-wrapper { position: relative; display: flex; align-items: center; flex-grow: 1; }
        #main-input { width: 100%; padding: 18px; padding-right: 65px; font-size: 22px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); outline: none; }
        #char-counter { position: absolute; right: 15px; font-family: sans-serif; font-size: 14px; color: var(--accent); font-weight: bold; background: #f9f9f7; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); }
        #rules-container { width: 100%; display: flex; flex-direction: column-reverse; gap: 15px; }
        .rule-card { background: var(--card-bg); padding: 20px; border-radius: 2px; border: 1px solid var(--border); border-top: 4px solid var(--error); box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .rule-card.valid { border-top-color: var(--success); opacity: 0.6; }
        .rule-num { font-size: 10px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; display: block; }
        .footer-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); padding: 10px 0 15px 0; display: flex; flex-direction: column; align-items: center; z-index: 1000; }
        .made-by { font-family: sans-serif; font-size: 12px; opacity: 0.6; margin-bottom: 8px; }
        .social-links { width: 100%; max-width: 550px; border-top: 1px solid var(--border); padding-top: 15px; display: flex; justify-content: center; gap: 30px; }
        .social-links a { color: var(--text); text-decoration: underline; font-family: sans-serif; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .legal-links { font-size: 12px; opacity: 0.5; margin-top: 20px; font-family: sans-serif; text-align: center; }
    </style>
</head>
<body>
    <div class="ad-sidebar ad-left"><ins class="adsbygoogle" style="display:inline-block;width:160px;height:600px" data-ad-client="ca-pub-3036128934622320" data-ad-slot="2391622638"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});</script></div>
    <div class="ad-sidebar ad-right"><ins class="adsbygoogle" style="display:inline-block;width:160px;height:600px" data-ad-client="ca-pub-3036128934622320" data-ad-slot="2391622638"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});</script></div>
    <div class="main-content">
        <div class="header"><a href="https://johanness7.github.io/"><img src="logo.png" alt="s7 hub logo"></a><h1>The Password Game</h1></div>
        <div id="password-container">
            <div class="input-group">
                <span id="share-status" class="btn-status">Copied!</span><span id="save-status" class="btn-status">Saved!</span>
                <button class="action-btn" onclick="shareWebsite()"><i class="fa-solid fa-reply fa-flip-horizontal"></i></button>
                <div class="input-wrapper"><input type="text" id="main-input" placeholder="Enter password..." autocomplete="off"><div id="char-counter">0</div></div>
                <button class="action-btn" onclick="savePassword()"><i class="fa-solid fa-floppy-disk"></i></button>
            </div>
        </div>
        <div id="rules-container"></div>
    </div>
    <div class="footer-fixed">
        <div class="made-by">made by johannes_s7</div>
        <div class="social-links">
            <a href="https://www.tiktok.com/@johannas.s7" target="_blank"><i class="fa-brands fa-tiktok"></i> TikTok</a>
            <a href="https://www.instagram.com/johannessiebecke" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram</a>
        </div>
        <div class="legal-links"><a href="privacy.html" style="color:inherit;text-decoration:none;">Privacy & Policy</a></div>
    </div>
    <script>
        const input = document.getElementById('main-input');
        const rulesContainer = document.getElementById('rules-container');
        const rules = [
            { desc: "At least 5 characters.", check: v => v.length >= 5 },
            { desc: "Must include a number.", check: v => /\d/.test(v) },
            { desc: "Must include an uppercase letter.", check: v => /[A-Z]/.test(v) },
            { desc: "Must include a special character.", check: v => /[!@#$%^&*(),.?":{}|<>]/.test(v) }
        ];
        function update() {
            const val = input.value;
            document.getElementById('char-counter').innerText = val.length;
            rulesContainer.innerHTML = '';
            for (let i = 0; i < rules.length; i++) {
                const isValid = rules[i].check(val);
                const card = document.createElement('div');
                card.className = `rule-card ${isValid ? 'valid' : ''}`;
                card.innerHTML = `<span class="rule-num">Rule ${i + 1}</span><span style="display:block; margin-top:5px;">${rules[i].desc}</span>`;
                rulesContainer.appendChild(card);
                if (!isValid) break;
            }
        }
        function savePassword() { localStorage.setItem('userPassword', input.value); showStatus('save-status'); }
        function showStatus(id) { const el = document.getElementById(id); el.style.opacity = "1"; setTimeout(() => { el.style.opacity = "0"; }, 2000); }
        function shareWebsite() { navigator.clipboard.writeText("Check out my game! https://johanness7.github.io/daspasswortspiel/"); showStatus('share-status'); }
        input.addEventListener('input', update);
        window.onload = () => { input.value = localStorage.getItem('userPassword') || ''; update(); };
    </script>
</body>
</html>
